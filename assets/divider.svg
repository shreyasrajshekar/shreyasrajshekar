<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 30" width="100%" height="30">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0" />
      <stop offset="20%" stop-color="#00F5FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#5B8CFF" stop-opacity="1" />
      <stop offset="80%" stop-color="#00FFA6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="50" y1="15" x2="950" y2="15" stroke="url(#div-grad)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="500,5 510,15 500,25 490,15" fill="#00F5FF" filter="url(#glow)"/>
  <circle cx="500" cy="15" r="3" fill="#0D1117"/>
  <circle cx="430" cy="15" r="2" fill="#5B8CFF"/>
  <circle cx="570" cy="15" r="2" fill="#00FFA6"/>
</svg>
