<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 210" width="100%" height="100%">
  <style>
    .sys-hdr { font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 600; fill: #FFFFFF; letter-spacing: 2px; }
    .sys-lbl { font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 500; fill: #888888; }
    .sys-val { font-family: 'Fira Code', monospace; font-size: 12px; fill: #DDDDDD; }
    .sys-on  { font-family: 'Fira Code', monospace; font-size: 12px; fill: #FFFFFF; font-weight: 600; }
  </style>

  <!-- Card Frame -->
  <rect width="1000" height="210" rx="10" fill="#0D1117" stroke="#333333" stroke-width="1.2"/>

  <!-- Top Status Bar -->
  <line x1="0" y1="36" x2="1000" y2="36" stroke="#333333" stroke-width="1"/>
  <circle cx="20" cy="18" r="4.5" fill="#444444" />
  <circle cx="35" cy="18" r="4.5" fill="#444444" />
  <circle cx="50" cy="18" r="4.5" fill="#444444" />
  <text x="500" y="22" text-anchor="middle" class="sys-hdr">SYSTEM ARCHITECTURE // OVERVIEW</text>

  <!-- Centered Grid Content -->
  <g transform="translate(60, 65)">
    <text x="0" y="0" class="sys-lbl">ACADEMICS    :</text>
    <text x="140" y="0" class="sys-val">B.E. Information Science &amp; Engineering @ NMIT Bengaluru</text>

    <text x="0" y="30" class="sys-lbl">FOCUS        :</text>
    <text x="140" y="30" class="sys-val">Machine Learning &amp; LLMs  •  Full-Stack &amp; Mobile App Dev  •  V2V OS</text>

    <text x="0" y="60" class="sys-lbl">V2V OS       :</text>
    <text x="140" y="60" class="sys-val">DriveLink OS (Intelligent Vehicle Communication Protocol &amp; Mesh Network)</text>

    <text x="0" y="90" class="sys-lbl">STATUS       :</text>
    <text x="140" y="90" class="sys-on">⚪ ONLINE &amp; ALWAYS BUILDING</text>
  </g>
</svg>
