<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 210" width="100%" height="100%">
  <defs>
    <linearGradient id="sys-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
  </defs>

  <style>
    .sys-header { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 600; fill: #58A6FF; letter-spacing: 2px; }
    .sys-label { font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 500; fill: #8B949E; }
    .sys-val { font-family: 'Fira Code', monospace; font-size: 12px; fill: #C9D1D9; }
    .sys-active { font-family: 'Fira Code', monospace; font-size: 12px; fill: #3FB950; font-weight: 600; }
  </style>

  <!-- Card Frame -->
  <rect width="1000" height="210" rx="10" fill="url(#sys-bg)" stroke="#30363D" stroke-width="1.2"/>

  <!-- Top Status Bar -->
  <line x1="0" y1="36" x2="1000" y2="36" stroke="#30363D" stroke-width="1"/>
  <circle cx="20" cy="18" r="4.5" fill="#484F58" />
  <circle cx="35" cy="18" r="4.5" fill="#484F58" />
  <circle cx="50" cy="18" r="4.5" fill="#484F58" />
  <text x="75" y="22" class="sys-header">SYSTEM ARCHITECTURE // OVERVIEW</text>

  <!-- Information Grid -->
  <g transform="translate(30, 65)">
    <text x="0" y="0" class="sys-label">ACADEMICS    :</text>
    <text x="140" y="0" class="sys-val">B.E. Information Science &amp; Engineering @ NMIT Bengaluru</text>

    <text x="0" y="30" class="sys-label">FOCUS        :</text>
    <text x="140" y="30" class="sys-val">Machine Learning &amp; LLMs  •  Full-Stack &amp; Mobile App Dev  •  V2V OS</text>

    <text x="0" y="60" class="sys-label">V2V OS       :</text>
    <text x="140" y="60" class="sys-val">DriveLink OS (Intelligent Vehicle Communication Protocol &amp; Mesh Network)</text>

    <text x="0" y="90" class="sys-label">STATUS       :</text>
    <text x="140" y="90" class="sys-active">🟢 Active &amp; Building</text>
  </g>
</svg>
