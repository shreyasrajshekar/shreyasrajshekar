<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="100%">
  <defs>
    <!-- Vercel / Linear Style Minimalist Background -->
    <radialGradient id="ambient-light" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1C2128" />
      <stop offset="60%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#05070A" />
    </radialGradient>

    <!-- Subtle Soft Glow -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Elegant Linear Gradient for Name -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E6EDF3" />
      <stop offset="100%" stop-color="#58A6FF" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;display=swap');

    .greek-char {
      fill: none;
      stroke: url(#text-grad);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#subtle-glow);
      stroke-dasharray: 350;
      stroke-dashoffset: 350;
      animation: strokeDraw 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .subtitle-sub {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 6px;
      fill: #8B949E;
      opacity: 0;
      animation: fadeIn 1.2s ease-out forwards 1.8s;
    }

    .badge-label {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      fill: #58A6FF;
      letter-spacing: 3px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out forwards 1.2s;
    }

    @keyframes strokeDraw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>

  <!-- Background Canvas -->
  <rect width="1200" height="280" fill="url(#ambient-light)" rx="12" />
  <rect width="1200" height="280" fill="none" stroke="#30363D" stroke-width="1" rx="12" />

  <!-- Minimal Top Subtitle Badge -->
  <text x="600" y="55" text-anchor="middle" class="badge-label">SYSTEM ARCHITECT // ML • LLM • APP DEV</text>
  <line x1="500" y1="68" x2="700" y2="68" stroke="#30363D" stroke-width="1" />

  <!-- GREEK VECTOR TYPOGRAPHY: SHREYAS -->
  <g transform="translate(435, 95)">
    <!-- S -->
    <path class="greek-char" d="M 22 4 L 4 4 L 16 22 L 4 40 L 22 40" />
    <!-- H -->
    <path class="greek-char" d="M 34 4 L 34 40 M 52 4 L 52 40 M 34 22 L 52 22" />
    <!-- R -->
    <path class="greek-char" d="M 64 4 L 64 40 M 64 4 L 78 4 L 82 13 L 78 22 L 64 22 M 74 22 L 84 40" />
    <!-- E -->
    <path class="greek-char" d="M 96 4 L 96 40 M 96 4 L 112 4 M 96 22 L 108 22 M 96 40 L 112 40" />
    <!-- Y -->
    <path class="greek-char" d="M 124 4 L 133 20 L 142 4 M 133 20 L 133 40" />
    <!-- A -->
    <path class="greek-char" d="M 163 4 L 153 40 M 163 4 L 173 40 M 157 28 L 169 28" />
    <!-- S -->
    <path class="greek-char" d="M 202 4 L 184 4 L 196 22 L 184 40 L 202 40" />
  </g>

  <!-- GREEK VECTOR TYPOGRAPHY: RAJASHEKAR -->
  <g transform="translate(390, 152)">
    <!-- R -->
    <path class="greek-char" d="M 4 4 L 4 40 M 4 4 L 18 4 L 22 13 L 18 22 L 4 22 M 14 22 L 24 40" />
    <!-- A -->
    <path class="greek-char" d="M 44 4 L 34 40 M 44 4 L 54 40 M 38 28 L 50 28" />
    <!-- J -->
    <path class="greek-char" d="M 64 4 L 82 4 M 76 4 L 76 34 L 66 40" />
    <!-- A -->
    <path class="greek-char" d="M 102 4 L 92 40 M 102 4 L 112 40 M 96 28 L 108 28" />
    <!-- S -->
    <path class="greek-char" d="M 140 4 L 122 4 L 134 22 L 122 40 L 140 40" />
    <!-- H -->
    <path class="greek-char" d="M 152 4 L 152 40 M 170 4 L 170 40 M 152 22 L 170 22" />
    <!-- E -->
    <path class="greek-char" d="M 182 4 L 182 40 M 182 4 L 198 4 M 182 22 L 194 22 M 182 40 L 198 40" />
    <!-- K -->
    <path class="greek-char" d="M 210 4 L 210 40 M 226 4 L 210 22 L 226 40" />
    <!-- A -->
    <path class="greek-char" d="M 246 4 L 236 40 M 246 4 L 256 40 M 240 28 L 252 28" />
    <!-- R -->
    <path class="greek-char" d="M 268 4 L 268 40 M 268 4 L 282 4 L 286 13 L 282 22 L 268 22 M 278 22 L 288 40" />
  </g>

  <!-- Minimal Subtitle -->
  <text x="600" y="232" text-anchor="middle" class="subtitle-sub">MACHINE LEARNING &amp; LLMs   •   APP DEVELOPMENT   •   V2V OS</text>
</svg>
