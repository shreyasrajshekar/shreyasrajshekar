<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090E" />
      <stop offset="50%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#111622" />
    </linearGradient>

    <!-- Text & Glow Gradients -->
    <linearGradient id="greek-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="40%" stop-color="#5B8CFF" />
      <stop offset="70%" stop-color="#00FFA6" />
      <stop offset="100%" stop-color="#8A2BE2" />
    </linearGradient>

    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="purple-mint" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FFA6" stop-opacity="0.9" />
    </linearGradient>

    <!-- Hexagon Pattern -->
    <pattern id="hex-grid" width="40" height="69.282" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 20 11.547 L 0 0 L 0 23.094 L 20 34.641 L 40 23.094 Z M 0 34.641 L 20 46.188 L 0 57.735 L 0 80.829 L 20 92.376 L 40 80.829 L 40 57.735 L 20 46.188 Z" fill="none" stroke="#5B8CFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <!-- Filters for Glow Effects -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-title" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="16" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&amp;family=Fira+Code:wght@400;600&amp;display=swap');
    
    .greek-title {
      font-family: 'Cinzel', 'Times New Roman', serif;
      font-weight: 900;
      font-size: 50px;
      letter-spacing: 12px;
      fill: url(#greek-gold);
      filter: url(#glow-title);
    }
    .subtitle-text {
      font-family: 'Fira Code', monospace;
      font-size: 15px;
      letter-spacing: 4px;
      fill: #00F5FF;
      opacity: 0.95;
    }
    .tag-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #00FFA6;
      letter-spacing: 2px;
    }
    .circuit-line {
      stroke-dasharray: 10 15;
      animation: dash 20s linear infinite;
    }
    .node-pulse {
      animation: node-ping 2.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -1000;
      }
    }
    @keyframes node-ping {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.4); opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" rx="16" />
  <rect width="1200" height="400" fill="url(#hex-grid)" rx="16" />

  <!-- Outer Cyber-Greek Frame -->
  <rect x="3" y="3" width="1194" height="394" fill="none" stroke="url(#cyan-blue)" stroke-width="1.5" rx="14" opacity="0.6"/>
  
  <!-- Greek Meander Corner Accents -->
  <path d="M 3 35 L 3 3 L 35 3 M 3 15 L 15 15 L 15 3" fill="none" stroke="#00F5FF" stroke-width="2" />
  <path d="M 1197 35 L 1197 3 L 1165 3 M 1197 15 L 1185 15 L 1185 3" fill="none" stroke="#00F5FF" stroke-width="2" />
  <path d="M 3 365 L 3 397 L 35 397 M 3 385 L 15 385 L 15 397" fill="none" stroke="#00F5FF" stroke-width="2" />
  <path d="M 1197 365 L 1197 397 L 1165 397 M 1197 385 L 1185 385 L 1185 397" fill="none" stroke="#00F5FF" stroke-width="2" />

  <!-- Neural ML Network Lines (Left & Right) -->
  <path class="circuit-line" d="M 50 200 L 150 200 L 220 130 L 350 130" fill="none" stroke="#5B8CFF" stroke-width="1.5" opacity="0.5"/>
  <path class="circuit-line" d="M 30 280 L 120 280 L 190 350 L 400 350" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.4"/>
  <path class="circuit-line" d="M 1150 200 L 1050 200 L 980 270 L 850 270" fill="none" stroke="#00FFA6" stroke-width="1.5" opacity="0.5"/>
  <path class="circuit-line" d="M 1170 120 L 1080 120 L 1010 50 L 800 50" fill="none" stroke="#5B8CFF" stroke-width="1.5" opacity="0.4"/>

  <!-- LLM & ML Neural Network Nodes -->
  <circle cx="220" cy="130" r="5" fill="#00F5FF" filter="url(#glow-cyan)"/>
  <circle cx="350" cy="130" r="4" fill="#00FFA6" />
  <circle cx="190" cy="350" r="5" fill="#8A2BE2" filter="url(#glow-cyan)"/>
  <circle cx="980" cy="270" r="5" fill="#00F5FF" filter="url(#glow-cyan)"/>
  <circle cx="1010" cy="50" r="4" fill="#00FFA6" />

  <!-- Central Glassmorphic Dashboard Panel -->
  <rect x="230" y="65" width="740" height="270" rx="16" fill="#0D1117" fill-opacity="0.85" stroke="url(#cyan-blue)" stroke-width="1.5" filter="url(#glow-cyan)"/>
  
  <!-- System Tag Header -->
  <g transform="translate(260, 102)">
    <rect x="0" y="0" width="200" height="24" rx="12" fill="#5B8CFF" fill-opacity="0.15" stroke="#5B8CFF" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="14" cy="12" r="4" fill="#00FFA6" />
    <text x="26" y="16" class="tag-text">SYSTEM // ML &amp; LLM CORE</text>
  </g>

  <g transform="translate(710, 102)">
    <text x="0" y="16" class="tag-text" fill="#8A2BE2">APP DEV :: MULTI-AGENT</text>
  </g>

  <!-- Main Hero Title (Classical / Greek Serif Font Aesthetic) -->
  <text x="600" y="195" text-anchor="middle" class="greek-title">ΣHREYAS RAJASHEKAR</text>

  <!-- Divider Bar -->
  <path d="M 330 220 L 870 220" stroke="url(#purple-mint)" stroke-width="2" stroke-linecap="round" />

  <!-- Subtitle emphasizing ML, LLM, App Dev -->
  <text x="600" y="255" text-anchor="middle" class="subtitle-text">MACHINE LEARNING &amp; LLMs  |  APP DEVELOPMENT  |  V2V SYSTEMS</text>
  
  <!-- Bottom Pill Badges -->
  <g transform="translate(325, 282)">
    <rect x="0" y="0" width="165" height="26" rx="6" fill="#161B22" stroke="#00F5FF" stroke-opacity="0.6" stroke-width="1"/>
    <text x="82.5" y="17" text-anchor="middle" font-family="Fira Code" font-size="11" fill="#00F5FF">🧠 ML &amp; LLM ARCH</text>

    <rect x="180" y="0" width="185" height="26" rx="6" fill="#161B22" stroke="#5B8CFF" stroke-opacity="0.6" stroke-width="1"/>
    <text x="272.5" y="17" text-anchor="middle" font-family="Fira Code" font-size="11" fill="#5B8CFF">📱 FULL-STACK APP DEV</text>

    <rect x="380" y="0" width="170" height="26" rx="6" fill="#161B22" stroke="#00FFA6" stroke-opacity="0.6" stroke-width="1"/>
    <text x="465" y="17" text-anchor="middle" font-family="Fira Code" font-size="11" fill="#00FFA6">🤖 MULTI-AGENT AI</text>
  </g>
</svg>
