<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" height="100%">
  <defs>
    <!-- Muted Dark Minimalist Background -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="60%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#080B0F" />
    </radialGradient>

    <!-- Subtle Premium Glow -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Minimalist Greek Key Pattern Band -->
    <pattern id="greek-band" width="40" height="16" patternUnits="userSpaceOnUse">
      <path d="M 0 16 L 0 0 L 16 0 L 16 10 L 8 10 L 8 5 L 11 5 M 16 16 L 24 16 L 24 0 L 40 0 L 40 10 L 32 10 L 32 5 L 35 5" fill="none" stroke="#388BFD" stroke-opacity="0.3" stroke-width="1.2"/>
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;display=swap');

    .greek-letter {
      fill: none;
      stroke: #F0F6FC;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#soft-glow);
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw-text 3.5s ease-out forwards, subtle-pulse 4s ease-in-out infinite alternate 3.5s;
    }

    .subtitle-text {
      font-family: 'Fira Code', -apple-system, monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 5px;
      fill: #58A6FF;
      opacity: 0;
      animation: fade-in 1.5s ease-out forwards 2s;
    }

    .tag-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #8B949E;
      letter-spacing: 3px;
    }

    @keyframes draw-text {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fade-in {
      to { opacity: 0.9; }
    }

    @keyframes subtle-pulse {
      0% { opacity: 0.85; stroke: #F0F6FC; }
      100% { opacity: 1; stroke: #58A6FF; }
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg-glow)" rx="12" />
  <rect width="1200" height="360" fill="none" stroke="#30363D" stroke-width="1" rx="12" />

  <!-- Top & Bottom Muted Greek Meander Bands -->
  <rect x="30" y="30" width="1140" height="14" fill="url(#greek-band)" />
  <rect x="30" y="316" width="1140" height="14" fill="url(#greek-band)" />

  <!-- Header Category Badge -->
  <g transform="translate(600, 75)">
    <text x="0" y="0" text-anchor="middle" class="tag-text">AI SYSTEMS &amp; FULL-STACK ARCHITECTURE</text>
  </g>

  <!-- GREEK VECTOR TYPOGRAPHY FOR "SHREYAS RAJASHEKAR" -->
  <!-- Name Line 1: SHREYAS -->
  <g transform="translate(365, 110)">
    <!-- S -->
    <path class="greek-letter" d="M 24 6 L 6 6 L 18 24 L 6 42 L 24 42" />
    <!-- H -->
    <path class="greek-letter" d="M 36 6 L 36 42 M 54 6 L 54 42 M 36 24 L 54 24" />
    <!-- R -->
    <path class="greek-letter" d="M 66 6 L 66 42 M 66 6 L 82 6 L 86 15 L 82 24 L 66 24 M 76 24 L 86 42" />
    <!-- E -->
    <path class="greek-letter" d="M 98 6 L 98 42 M 98 6 L 114 6 M 98 24 L 110 24 M 98 42 L 114 42" />
    <!-- Y -->
    <path class="greek-letter" d="M 126 6 L 135 24 L 144 6 M 135 24 L 135 42" />
    <!-- A -->
    <path class="greek-letter" d="M 165 6 L 155 42 M 165 6 L 175 42 M 159 30 L 171 30" />
    <!-- S -->
    <path class="greek-letter" d="M 204 6 L 186 6 L 198 24 L 186 42 L 204 42" />
  </g>

  <!-- Name Line 2: RAJASHEKAR -->
  <g transform="translate(320, 170)">
    <!-- R -->
    <path class="greek-letter" d="M 6 6 L 6 42 M 6 6 L 22 6 L 26 15 L 22 24 L 6 24 M 16 24 L 26 42" />
    <!-- A -->
    <path class="greek-letter" d="M 46 6 L 36 42 M 46 6 L 56 42 M 40 30 L 52 30" />
    <!-- J -->
    <path class="greek-letter" d="M 66 6 L 84 6 M 78 6 L 78 36 L 68 42" />
    <!-- A -->
    <path class="greek-letter" d="M 104 6 L 94 42 M 104 6 L 114 42 M 98 30 L 110 30" />
    <!-- S -->
    <path class="greek-letter" d="M 142 6 L 124 6 L 136 24 L 124 42 L 142 42" />
    <!-- H -->
    <path class="greek-letter" d="M 154 6 L 154 42 M 172 6 L 172 42 M 154 24 L 172 24" />
    <!-- E -->
    <path class="greek-letter" d="M 184 6 L 184 42 M 184 6 L 200 6 M 184 24 L 196 24 M 184 42 L 200 42" />
    <!-- K -->
    <path class="greek-letter" d="M 212 6 L 212 42 M 228 6 L 212 24 L 228 42" />
    <!-- A -->
    <path class="greek-letter" d="M 248 6 L 238 42 M 248 6 L 258 42 M 242 30 L 254 30" />
    <!-- R -->
    <path class="greek-letter" d="M 270 6 L 270 42 M 270 6 L 286 6 L 290 15 L 286 24 L 270 24 M 280 24 L 290 42" />
  </g>

  <!-- Minimalist Separator Line -->
  <line x1="450" y1="242" x2="750" y2="242" stroke="#388BFD" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="600" y="275" text-anchor="middle" class="subtitle-text">MACHINE LEARNING &amp; LLMs   •   APP DEVELOPMENT   •   V2V OS</text>
</svg>
