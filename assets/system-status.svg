<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="100%" height="100%">
  <defs>
    <linearGradient id="sys-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#121822" />
    </linearGradient>
    <linearGradient id="sys-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="50%" stop-color="#5B8CFF" />
      <stop offset="100%" stop-color="#00FFA6" />
    </linearGradient>
    <filter id="sys-glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .sys-title { font-family: 'Fira Code', monospace; font-size: 14px; font-weight: 600; fill: #00F5FF; letter-spacing: 2px; }
    .sys-label { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 600; fill: #5B8CFF; }
    .sys-value { font-family: 'Fira Code', monospace; font-size: 13px; fill: #E6EDF3; }
    .sys-highlight { font-family: 'Fira Code', monospace; font-size: 13px; fill: #00FFA6; font-weight: 600; }
  </style>

  <!-- Card Frame -->
  <rect width="1000" height="240" rx="12" fill="url(#sys-bg)" stroke="url(#sys-border)" stroke-width="1.5" filter="url(#sys-glow)"/>

  <!-- Top Bar -->
  <path d="M 0 36 L 1000 36" stroke="#5B8CFF" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="20" cy="18" r="5" fill="#FF5F56" />
  <circle cx="36" cy="18" r="5" fill="#FFBD2E" />
  <circle cx="52" cy="18" r="5" fill="#27C93F" />
  <text x="75" y="22" class="sys-title">SYSTEM // ARCHITECTURE_STATUS.SYS</text>

  <!-- Content Rows -->
  <g transform="translate(30, 70)">
    <text x="0" y="0" class="sys-label">ACADEMICS    :</text>
    <text x="140" y="0" class="sys-value">B.E. Information Science &amp; Engineering @ NMIT, Bengaluru 🇮🇳</text>

    <text x="0" y="32" class="sys-label">CORE FOCUS   :</text>
    <text x="140" y="32" class="sys-highlight">Machine Learning &amp; LLMs  |  Full-Stack &amp; Mobile App Dev  |  Multi-Agent AI</text>

    <text x="0" y="64" class="sys-label">VEC OS       :</text>
    <text x="140" y="64" class="sys-value">DriveLink OS (Vehicle-to-Vehicle Intelligent Communication Network)</text>

    <text x="0" y="96" class="sys-label">STACK        :</text>
    <text x="140" y="96" class="sys-value">Python (PyTorch / ML), TypeScript, React, Next.js, Node.js, C++, Rust</text>

    <text x="0" y="128" class="sys-label">STATUS       :</text>
    <text x="140" y="128" class="sys-highlight">🟢 ONLINE &amp; ALWAYS BUILDING</text>
  </g>
</svg>
